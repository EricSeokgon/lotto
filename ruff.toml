line-length = 100
target-version = "py311"
src = ["lotto", "tests"]

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "A",   # flake8-builtins
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "TCH", # flake8-type-checking
    "ANN", # flake8-annotations
]
ignore = []

[lint.per-file-ignores]
"tests/**" = ["TC001", "TC002", "TC003", "ANN"]

[lint.isort]
known-first-party = ["lotto"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
