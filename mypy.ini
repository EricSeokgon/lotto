[mypy]
python_version = 3.11
strict = True
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_reexport = True
show_error_codes = True

[mypy-requests_mock.*]
ignore_missing_imports = True

# SPEC-LOTTO-045: 스텁 미제공 서드파티(apscheduler)의 import-untyped 억제.
# apscheduler는 py.typed 마커가 없어 module is installed but missing stubs 경고 발생.
# (fpdf는 스텁 레지스트리 등록 라이브러리라 ignore_missing_imports로 억제되지 않으므로
#  pdf_report.py에서 라인 단위 type: ignore[import-untyped]로 처리한다.)
[mypy-apscheduler]
ignore_missing_imports = True

[mypy-apscheduler.*]
ignore_missing_imports = True

# SPEC-LOTTO-045: 테스트 모듈 엄격도 완화.
# tests 디렉터리에 __init__.py 가 없어 mypy 모듈명은 패키지(tests.*)가 아니라
# 파일 stem(test_*, conftest)이다. mypy는 컴포넌트 내 접두사 와일드카드(test_*)를
# 거부하므로 전체 테스트 모듈명을 명시적으로 나열한다.
# 테스트 코드는 출하되지 않으므로 함수 타입 미주석을 강제하지 않는다.
# 단, check_untyped_defs=True 로 본문은 계속 타입 검사하며,
# no_implicit_reexport=False 로 소스 모듈 심볼(settings, time 등) 패치 접근을 허용한다.
[mypy-conftest,test_affinity_page,test_analyzer,test_api_affinity,test_api_compare,test_api_consecutive,test_api_number_trend,test_api_pagination,test_api_prediction,test_api_range_stats,test_api_scraper_worker,test_api_stats_overview,test_api_strategy_filter,test_app_lifespan,test_bonus_api,test_bonus_avoidance,test_bonus_stats,test_check,test_cli_integration,test_cli,test_cli_web,test_collector_append,test_collector_atomic,test_collector_gaps,test_collector,test_collector_sync_meta,test_collect_summary,test_combination,test_compare_numbers,test_compare_page,test_config_edge,test_config,test_consecutive_page,test_consecutive_pattern,test_dark_mode,test_dashboard_overview,test_data_cache,test_delete_draw,test_draw_detail,test_error_logging,test_export,test_favorites,test_filtered_recommend,test_gen_history,test_health_endpoint,test_integration_pipeline,test_integration,test_manual_draw_validation,test_models,test_notifier,test_number_affinity,test_number_notes,test_number_stats,test_numbers_trend_page,test_number_trend,test_pages_gap_rounds,test_pages_last_date,test_pattern_analysis,test_pdf_endpoint,test_pdf_report,test_prediction_page,test_prediction_report,test_prize_auto_match,test_prize_crawling,test_prize_stats,test_purchase,test_purchases_api,test_purchases_page,test_range_stats_page,test_range_stats,test_recommender_edge,test_recommender_fallback,test_recommender,test_recommender_strategies,test_reservations,test_scheduler,test_scraper_edge,test_scraper,test_settings,test_simulator,test_stats_page,test_strategy_compare,test_trend,test_web_api,test_web_app,test_web_coverage,test_web_data,test_web_pages,test_weekly_report,test_yearly_prize,test_api_yearly_prize,test_yearly_prize_page,test_cycle_analysis,test_api_cycle,test_cycle_page,test_sim_history,test_api_sim_history,test_sim_history_page,test_sum_range,test_api_sum_range,test_sum_range_page]
disallow_untyped_defs = False
disallow_incomplete_defs = False
disallow_untyped_calls = False
disallow_any_generics = False
check_untyped_defs = True
warn_return_any = False
no_implicit_reexport = False
